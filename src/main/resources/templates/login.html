<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Skillo Learn</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        .auth-wrapper { min-height: 100vh; background: var(--navy); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo img { height: 70px; margin-bottom: 10px; }
        .auth-logo h2 { font-size: 22px; font-weight: 800; color: var(--navy); }
        .auth-logo h2 span { color: var(--gold); }
        .auth-logo p { color: var(--gray); font-size: 13px; margin-top: 4px; }
        .tabs { display: flex; background: var(--light-bg); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
        .tab { flex: 1; text-align: center; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--gray); border: none; background: transparent; }
        .tab.active { background: var(--navy); color: white; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--card-border); border-radius: 10px; font-size: 14px; outline: none; color: var(--navy); }
        .form-group input:focus { border-color: var(--blue); }
        .auth-btn { width: 100%; background: var(--navy); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 6px; }
        .auth-btn:hover { background: var(--blue); }
        .error-msg { background: #ffe4e6; color: #9f1239; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
        .success-msg { background: #d4f5e9; color: #065438; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
        .back-home { display: block; text-align: center; margin-top: 18px; color: var(--gray); font-size: 13px; text-decoration: none; }
        .back-home:hover { color: var(--navy); }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-box">
        <div class="auth-logo">
            <img th:src="@{/logoSL.png}" alt="Skillo Learn">
            <h2>SKILLO <span>LEARN</span></h2>
            <p>Elevate Your Edge</p>
        </div>

        <div class="tabs">
            <button class="tab active" id="login-tab" onclick="switchTab('login')">Login</button>
            <button class="tab" id="signup-tab" onclick="switchTab('signup')">Sign Up</button>
            <button class="tab" id="admin-tab" onclick="switchTab('admin')">🔐 Admin</button>
        </div>

        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>

        <!-- LOGIN FORM -->
        <div id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password">
            </div>
            <button class="auth-btn" onclick="doLogin()">Login to Skillo Learn</button>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signup-form" style="display:none;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Create a password">
            </div>
            <button class="auth-btn" onclick="doSignup()">Create Account</button>
        </div>

        <!-- ADMIN LOGIN FORM -->
        <div id="admin-form" style="display:none;">
            <div style="background:#fff3d4; border:1.5px solid #f5a623; border-radius:10px; padding:12px 16px; margin-bottom:18px; font-size:13px; color:#7c4400;">
                🔐 This login is for <strong>administrators only</strong>.
            </div>
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="admin-email" placeholder="Enter admin email">
            </div>
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="admin-password" placeholder="Enter admin password">
            </div>
            <button class="auth-btn" style="background:#0d1b35;" onclick="doAdminLogin()">Login as Admin</button>
        </div>

        <a href="/" class="back-home">← Back to Home</a>
    </div>
</div>

<script>
    // ===== ADMIN CREDENTIALS - change these =====
    const ADMIN_EMAIL = 'admin@skillolearn.com';
    const ADMIN_PASSWORD = 'admin123';

    function switchTab(tab) {
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
        document.getElementById('admin-form').style.display = tab === 'admin' ? 'block' : 'none';
        document.getElementById('login-tab').className = 'tab' + (tab === 'login' ? ' active' : '');
        document.getElementById('signup-tab').className = 'tab' + (tab === 'signup' ? ' active' : '');
        document.getElementById('admin-tab').className = 'tab' + (tab === 'admin' ? ' active' : '');
        hideMessages();
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('success-msg');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('error-msg').style.display = 'none';
    }

    function hideMessages() {
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('success-msg').style.display = 'none';
    }

    function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value.trim();
        if (!email || !password) { showError('Please fill in all fields.'); return; }
        const users = JSON.parse(localStorage.getItem('skilloUsers')) || [];
        const user = users.find(u => u.email === email && u.password === password);
        if (!user) { showError('Invalid email or password. Please try again.'); return; }
        const loggedIn = { name: user.name, email: user.email, role: user.role || 'user' };
        localStorage.setItem('skilloLoggedIn', JSON.stringify(loggedIn));
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => { window.location.href = '/'; }, 1200);
    }

    function doSignup() {
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value.trim();
        if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
        if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
        let users = JSON.parse(localStorage.getItem('skilloUsers')) || [];
        if (users.find(u => u.email === email)) { showError('An account with this email already exists.'); return; }
        users.push({ name, email, password, role: 'user' });
        localStorage.setItem('skilloUsers', JSON.stringify(users));
        localStorage.setItem('skilloLoggedIn', JSON.stringify({ name, email, role: 'user' }));
        showSuccess('Account created! Redirecting...');
        setTimeout(() => { window.location.href = '/'; }, 1200);
    }

    function doAdminLogin() {
        const email = document.getElementById('admin-email').value.trim();
        const password = document.getElementById('admin-password').value.trim();
        if (!email || !password) { showError('Please fill in all fields.'); return; }
        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            const adminUser = { name: 'Admin', email: ADMIN_EMAIL, role: 'admin' };
            localStorage.setItem('skilloLoggedIn', JSON.stringify(adminUser));
            showSuccess('Welcome Admin! Redirecting...');
            setTimeout(() => { window.location.href = '/admin'; }, 1200);
        } else {
            showError('Invalid admin credentials.');
        }
    }
</script>
</body>
</html>
